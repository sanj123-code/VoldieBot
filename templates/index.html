<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title> 🐍Mr.VOLDIE's Classroom</title>
  <style>
    /* ---- basic styling ---- */
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      background: #f5f5f5;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    /* ---- chat window ---- */
    #chat-box {
      background: palegreen;
      border: 1px solid #ddd;
      border-radius: 10px;
      height: 450px;
      overflow-y: auto;   /* makes it scrollable */
      padding: 20px;
      margin-bottom: 16px;
    }

    /* ---- each message bubble ---- */
    .message {
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .user {
      text-align: right;
      color: #19ba77;
    }

    .teacher {
      text-align: left;
      color: #583a7d;
    }

    .label {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
    }

    .bubble {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      max-width: 80%;
      text-align: left;
    }

    .user .bubble   { background: #d6eaf8; }
    .teacher .bubble { background: #eaecee; }

    /* ---- input area ---- */
    #input-area {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      background: #67b58e;
      color: YELLOW;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #1a252f; }
  </style>
</head>

<body>

  <h1>📚 Mr. VOLDIE's Classroom</h1>

  <!-- ② DISPLAY — chat messages appear here -->
  <div id="chat-box">
    <div class="message teacher">
      <div class="label">Mr.VOLDIE</div>
      <div class="bubble">
        Good day. I am Mr.VOLDIE. Ask me anything — 
        Do not worry about the questions...I will solve the silliest doubts tho i dont have a nose😊.
      </div>
    </div>
  </div>

  <!-- ③ INPUT — user types here -->
  <div id="input-area">
    <input
      id="user-input"
      type="text"
      placeholder="Ask Mr.VOLDIE something..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    // This function runs when user clicks Send
    async function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();

      if (!message) return; // do nothing if empty

      // Show user's message in chat
      addMessage("You", message, "user");
      input.value = ""; // clear input box

      // Show a "thinking" message while waiting
      addMessage("Mr.VOLDIE", "...", "teacher", "thinking");

      // Send message to your Python backend
      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();

      // Replace "thinking" with actual reply
     // Remove the thinking bubble
const thinking = document.getElementById("thinking");
if (thinking) thinking.remove();

// Check what we actually got back
console.log("Reply received:", data.reply);

// Show the reply
if (data.reply) {
    addMessage("Mr.VOLDIE", data.reply, "teacher");
} else {
    addMessage("Mr.VOLDIE", "No response received.", "teacher");
}}
    // This function adds a message bubble to the chat window
    function addMessage(sender, text, type, id = "") {
      const chatBox = document.getElementById("chat-box");

      const div = document.createElement("div");
      div.className = `message ${type}`;
      if (id) div.id = id;

      div.innerHTML = `
        <div class="label">${sender}</div>
        <div class="bubble">${text}</div>
      `;

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight; // auto scroll down
    }
  </script>

</body>
</html>
